# 本地开发用 PostgreSQL：docker compose -f docker-compose.dev.yml up -d
# 然后：DATABASE_URL=postgresql://yanke:yanke@localhost:5432/yanke npm run db:init
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: yanke
      POSTGRES_PASSWORD: yanke
      POSTGRES_DB: yanke
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yanke -d yanke"]
      interval: 2s
      timeout: 3s
      retries: 15
    ports:
      - "5432:5432"
    volumes:
      - yanke_pg:/var/lib/postgresql/data

volumes:
  yanke_pg:
